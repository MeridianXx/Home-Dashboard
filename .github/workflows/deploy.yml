name: Bygg & deploya

on:
  push:
    branches: [v2]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # behövs för att pusha till GHCR

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sätt upp Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bygg & pusha image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/meridianxx/home-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploya på servern via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/home-dashboard
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u meridianxx --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
