name: Bygg & deploya

on:
  push:
    branches: [v2]

jobs:
  # ── Job 1: Bygg image och pusha till GHCR ──────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Logga in på GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sätt upp Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bygg & pusha image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/meridianxx/home-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploya på servern via self-hosted runner ───────────────────────
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Dra ny image och starta om
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/meridianxx/home-dashboard:latest
          docker stop home-dashboard 2>/dev/null || true
          docker rm   home-dashboard 2>/dev/null || true
          docker run -d \
            --name home-dashboard \
            --restart unless-stopped \
            -p 3457:3000 \
            -e NODE_ENV=production \
            -e NEXT_TELEMETRY_DISABLED=1 \
            -e PROXMOX_TOKEN_ID="${{ secrets.PROXMOX_TOKEN_ID }}" \
            -e PROXMOX_TOKEN_SECRET="${{ secrets.PROXMOX_TOKEN_SECRET }}" \
            -e UNRAID_URL="${{ secrets.UNRAID_URL }}" \
            -e UNRAID_API_KEY="${{ secrets.UNRAID_API_KEY }}" \
            -e PORTAINER_URL="${{ secrets.PORTAINER_URL }}" \
            -e PORTAINER_API_TOKEN="${{ secrets.PORTAINER_API_TOKEN }}" \
            -e PORTAINER_ENDPOINT_ID="${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -l "com.centurylinklabs.watchtower.enable=false" \
            ghcr.io/meridianxx/home-dashboard:latest
          docker image prune -f
